<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <title>池田町スキャナー</title>
  <script src="https://unpkg.com/html5-qrcode"></script>
  <style>
    body { font-family: sans-serif; text-align: center; background: black; color: white; margin: 0; padding: 0; overflow: hidden; height: 100vh; }
    #reader { width: 100vw !important; height: 100vh !important; }
    video { object-fit: cover !important; width: 100vw !important; height: 100vh !important; }
    
    .overlay {
      position: absolute; top: 0; left: 0; width: 100%; height: 100%;
      display: flex; flex-direction: column; justify-content: space-between;
      pointer-events: none; z-index: 10;
    }
    .header { background: rgba(0, 0, 0, 0.7); padding: 15px; font-weight: bold; }
    .footer { background: rgba(0, 0, 0, 0.7); padding: 30px 15px; }
    .footer b { color: #A7F3D0; font-size: 18px; display: block; margin-bottom: 5px; }

    /* 標準の白い枠以外の余計なUIを隠す */
    #reader__dashboard, #reader__status_span { display: none !important; }
  </style>
</head>
<body>
  <div id="reader"></div>
  <div class="overlay">
    <div class="header">長野県 池田町 スタンプラリー</div>
    <div class="footer">
      <b>QRをスキャンしてください</b>
      枠の中にQRコードを合わせてください
    </div>
  </div>

  <script>
    /* 【重要】最新のGAS URLに差し替えました */
    const GAS_URL = "https://script.google.com/macros/s/AKfycbya6Q6HsYVdqw9b2mReeyizY3GME6GYhs7vnNJUIeHtMnimSr-LPqqmtCm_6XfrOgfrEQ/exec";
    
    const html5QrCode = new Html5Qrcode("reader");

    html5QrCode.start(
      { facingMode: "environment" }, 
      { fps: 15, qrbox: 250 }, 
      (decodedText) => {
        // スキャン成功時に最新のGASへ結果を送信
        window.location.href = GAS_URL + "?spot=" + encodeURIComponent(decodedText);
      }
    ).catch(err => console.error(err));
  </script>
</body>
</html>
