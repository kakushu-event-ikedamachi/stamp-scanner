<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>QRスキャナー</title>
  <script src="https://unpkg.com/html5-qrcode"></script>
  <style>
    body { font-family: sans-serif; text-align: center; background: #333; color: white; margin: 0; padding: 0; }
    #reader { width: 100%; max-width: 500px; margin: 0 auto; }
  </style>
</head>
<body>
  <div id="reader"></div>
  <script>
    const GAS_URL = "https://script.google.com/macros/s/AKfycbya6Q6HsYVdqw9b2mReeyizY3GME6GYhs7vnNJUIeHtMnimSr-LPqqmtCm_6XfrOgfrEQ/exec";

    const html5QrCode = new Html5Qrcode("reader");
    html5QrCode.start({ facingMode: "environment" }, { fps: 10, qrbox: 250 }, (decodedText) => {
      // 読み取ったら即座にGASへ飛ばす
      window.location.href = GAS_URL + "?spot=" + encodeURIComponent(decodedText);
    }).catch(err => {
      console.error(err);
      alert("カメラを起動できません。設定を確認してください。");
    });
  </script>
</body>
</html>
