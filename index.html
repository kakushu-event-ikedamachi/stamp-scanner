<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>池田町 QRスキャナー</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        body { font-family: sans-serif; margin: 0; padding: 0; background-color: #2D5A27; color: white; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        #reader { width: 100%; max-width: 500px; background: black; border-radius: 12px; overflow: hidden; }
        .info { padding: 20px; text-align: center; }
        .btn-cancel { margin-top: 20px; padding: 12px 25px; background: white; color: #2D5A27; text-decoration: none; border-radius: 25px; font-weight: bold; border: none; cursor: pointer; display: inline-block; }
    </style>
</head>
<body>
    <div class="info">
        <h2>QRコードを読み取ってください</h2>
        <p>スタンプポイントのQRを画面枠内に入れてください</p>
    </div>

    <div id="reader"></div>

    <button id="cancelBtn" class="btn-cancel">スタンプカードに戻る</button>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const returnUrl = urlParams.get('return');

        function onScanSuccess(decodedText) {
            html5QrCode.stop().then(() => {
                if (returnUrl) {
                    const joinChar = returnUrl.includes('?') ? '&' : '?';
                    window.location.href = returnUrl + joinChar + "spot=" + encodeURIComponent(decodedText);
                } else {
                    alert("スキャン成功: " + decodedText);
                }
            }).catch(err => {
                console.error("停止エラー", err);
            });
        }

        const html5QrCode = new Html5Qrcode("reader");
        const config = { fps: 10, qrbox: { width: 250, height: 250 } };

        // カメラ起動
        html5QrCode.start({ facingMode: "environment" }, config, onScanSuccess)
        .catch(err => {
            console.error(err);
            alert("カメラの起動に失敗しました。ブラウザの設定でカメラ権限を「許可」にしてください。");
        });

        // 戻るボタン
        document.getElementById('cancelBtn').onclick = function() {
            if (returnUrl) {
                window.location.href = returnUrl;
            } else {
                window.history.back();
            }
        };
    </script>
</body>
</html>
